services:
  mediaops:
    build: .
    container_name: mediaops
    ports:
      - "8990:8080"
    volumes:
      - /opt/mediaops/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - NODE_ENV=production
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    restart: unless-stopped
